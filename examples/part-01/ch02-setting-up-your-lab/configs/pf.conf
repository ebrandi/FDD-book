# /etc/pf.conf - minimal lab firewall ruleset
#
# Companion for Chapter 2, section "Basic Hardening for Your Lab",
# Option A. Block everything inbound except SSH.
#
# Replace the "ext_if" value with the name of your external network
# interface. In a VM you'll usually see "vtnet0"; on bare metal you
# may see em0, re0, igb0, and so on. Use "ifconfig" to find out.

set skip on lo

ext_if = "em0"
tcp_services = "{ ssh }"

block in all
pass out all keep state
pass in on $ext_if proto tcp to (self) port $tcp_services keep state
